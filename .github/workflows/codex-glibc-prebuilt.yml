name: Publish codex-glibc prebuilt

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-glibc-prebuilt
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      codex_ref: ${{ steps.codex.outputs.codex_ref }}
      release_tag: ${{ steps.codex.outputs.release_tag }}
      exists: ${{ steps.release.outputs.exists }}
      complete: ${{ steps.release.outputs.complete }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve latest upstream Codex release tag
        id: codex
        shell: bash
        run: |
          set -euo pipefail
          version_tags="$(
            git ls-remote --tags --refs https://github.com/openai/codex.git \
              | awk '{print $2}' \
              | tr -d '\r' \
              | { grep -E '^refs/tags/rust-v[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
              | sed 's#refs/tags/##' \
              | sort -u
          )"
          codex_ref="$(printf '%s\n' "${version_tags}" | sort -V | tail -n1)"
          if [[ -z "${codex_ref}" ]]; then
            echo "Failed to resolve latest rust-vX.Y.Z tag from openai/codex" >&2
            exit 1
          fi

          release_tag="codex-glibc-${codex_ref}"
          echo "codex_ref=${codex_ref}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Codex tag: ${codex_ref}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Target release tag: ${release_tag}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Check whether release already exists and contains all required assets
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          expected_assets=(
            "codex-glibc-linux-amd64.gz"
            "codex-glibc-linux-amd64-info.txt"
            "codex-glibc-linux-arm64.gz"
            "codex-glibc-linux-arm64-info.txt"
          )

          if gh release view "${{ steps.codex.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            release_json="$(gh release view "${{ steps.codex.outputs.release_tag }}" --json assets)"
            asset_names="$(printf '%s' "${release_json}" | python3 -c 'import json, sys; data=json.load(sys.stdin); print("\n".join(asset["name"] for asset in data.get("assets", [])))')"
            missing_assets=()
            for asset in "${expected_assets[@]}"; do
              if ! printf '%s\n' "${asset_names}" | grep -Fxq "${asset}"; then
                missing_assets+=("${asset}")
              fi
            done

            if [[ "${#missing_assets[@]}" -eq 0 ]]; then
              echo "complete=true" >> "${GITHUB_OUTPUT}"
              echo "Release already exists and already contains all required assets, skipping build." >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "complete=false" >> "${GITHUB_OUTPUT}"
              {
                echo "Release exists but is missing assets:"
                printf -- '- %s\n' "${missing_assets[@]}"
              } >> "${GITHUB_STEP_SUMMARY}"
            fi
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "complete=false" >> "${GITHUB_OUTPUT}"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.complete != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            output_basename: codex-glibc-linux-amd64
            output_info_name: codex-glibc-linux-amd64-info.txt
          - runner: ubuntu-24.04-arm
            arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            output_basename: codex-glibc-linux-arm64
            output_info_name: codex-glibc-linux-arm64-info.txt
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build codex-glibc prebuilt archive
        shell: bash
        env:
          CODEX_REF: ${{ needs.resolve.outputs.codex_ref }}
          RUST_TARGET: ${{ matrix.rust_target }}
          OUTPUT_BASENAME: ${{ matrix.output_basename }}
          OUTPUT_INFO_NAME: ${{ matrix.output_info_name }}
        run: ./prebuilt-agents/codex-glibc/build.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-glibc-${{ matrix.arch }}
          path: |
            prebuilt-agents/codex-glibc/builds/${{ matrix.output_basename }}.gz
            prebuilt-agents/codex-glibc/builds/${{ matrix.output_info_name }}
          if-no-files-found: error

  publish:
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.complete != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/codex-glibc-release

      - name: Create release notes
        shell: bash
        run: |
          set -euo pipefail
          cat <<EOF > /tmp/codex-glibc-release/release-notes.txt
          codex-glibc prebuilt ${{ needs.resolve.outputs.codex_ref }}

          Published assets:
          - codex-glibc-linux-amd64.gz
          - codex-glibc-linux-amd64-info.txt
          - codex-glibc-linux-arm64.gz
          - codex-glibc-linux-arm64-info.txt
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            /tmp/codex-glibc-release/codex-glibc-amd64/codex-glibc-linux-amd64.gz
            /tmp/codex-glibc-release/codex-glibc-amd64/codex-glibc-linux-amd64-info.txt
            /tmp/codex-glibc-release/codex-glibc-arm64/codex-glibc-linux-arm64.gz
            /tmp/codex-glibc-release/codex-glibc-arm64/codex-glibc-linux-arm64-info.txt
          )

          if [[ "${{ needs.resolve.outputs.exists }}" == "true" ]]; then
            gh release upload "${{ needs.resolve.outputs.release_tag }}" "${assets[@]}" --clobber
            echo "Uploaded missing or refreshed assets to existing release ${{ needs.resolve.outputs.release_tag }}" >> "${GITHUB_STEP_SUMMARY}"
          else
            gh release create "${{ needs.resolve.outputs.release_tag }}" \
              "${assets[@]}" \
              --title "codex-glibc prebuilt ${{ needs.resolve.outputs.codex_ref }}" \
              --notes-file /tmp/codex-glibc-release/release-notes.txt
            echo "Published release ${{ needs.resolve.outputs.release_tag }}" >> "${GITHUB_STEP_SUMMARY}"
          fi
