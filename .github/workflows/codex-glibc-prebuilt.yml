name: Publish codex-glibc prebuilt

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-glibc-prebuilt
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve latest upstream Codex release tag
        id: codex
        shell: bash
        run: |
          set -euo pipefail
          version_tags="$(
            git ls-remote --tags --refs https://github.com/openai/codex.git \
              | awk '{print $2}' \
              | tr -d '\r' \
              | { grep -E '^refs/tags/rust-v[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
              | sed 's#refs/tags/##' \
              | sort -u
          )"
          codex_ref="$(printf '%s\n' "${version_tags}" | sort -V | tail -n1)"
          if [[ -z "${codex_ref}" ]]; then
            echo "Failed to resolve latest rust-vX.Y.Z tag from openai/codex" >&2
            exit 1
          fi

          release_tag="codex-glibc-${codex_ref}"
          echo "codex_ref=${codex_ref}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Codex tag: ${codex_ref}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Target release tag: ${release_tag}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Check whether release already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.codex.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Release already exists, skipping build." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build codex-glibc prebuilt archive
        if: steps.release.outputs.exists != 'true'
        shell: bash
        env:
          CODEX_REF: ${{ steps.codex.outputs.codex_ref }}
        run: ./prebuilt-agents/codex-glibc/build.sh

      - name: Publish GitHub release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.codex.outputs.release_tag }}" \
            prebuilt-agents/codex-glibc/builds/codex-glibc-linux-amd64.gz \
            prebuilt-agents/codex-glibc/builds/README.md \
            --title "codex-glibc prebuilt ${{ steps.codex.outputs.codex_ref }}" \
            --notes-file prebuilt-agents/codex-glibc/builds/README.md
          echo "Published release ${{ steps.codex.outputs.release_tag }}" >> "${GITHUB_STEP_SUMMARY}"
