---
- name: Install cline
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Register Multipass VM
      ansible.builtin.add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_name }}"
        ansible_connection: agsekit_multipass
        ansible_python_interpreter: /usr/bin/python3

- name: Install Cline CLI
  hosts: "{{ vm_name }}"
  gather_facts: true
  vars:
    nvm_dir: "{{ ansible_env.HOME }}/.nvm"
    node_version: "24"
  tasks:
    - name: Configure proxychains
      ansible.builtin.include_tasks: "{{ playbook_dir }}/proxychains.yml"

    - name: Install curl
      ansible.builtin.apt:
        update_cache: true
        name: curl
      become: true

    - name: Check for node
      ansible.builtin.shell: >-
        bash -lc "if command -v node >/dev/null 2>&1; then
        node -v;
        elif [ -s '{{ nvm_dir }}/nvm.sh' ]; then
        . '{{ nvm_dir }}/nvm.sh' && nvm use --silent default >/dev/null && node -v;
        else
        exit 1;
        fi"
      register: node_check
      changed_when: false
      failed_when: false

    - name: Check for nvm
      ansible.builtin.stat:
        path: "{{ nvm_dir }}/nvm.sh"
      register: nvm_stat

    - name: Download nvm installer
      ansible.builtin.command: "{{ proxychains_prefix }}curl -o /tmp/nvm-install.sh https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh"
      when: not nvm_stat.stat.exists

    - name: Install nvm
      ansible.builtin.command: "{{ proxychains_prefix }}bash /tmp/nvm-install.sh"
      when: not nvm_stat.stat.exists
      args:
        creates: "{{ nvm_dir }}/nvm.sh"

    - name: Install Node.js
      ansible.builtin.shell: |-
        {{ proxychains_prefix }}bash -lc '
        . {{ nvm_dir }}/nvm.sh
        resolved_version="$(nvm ls-remote | awk '"'"'/^[[:space:]]*v{{ node_version | replace(".", "\\.") }}\\./ { version=$1 } END { print version }'"'"')"
        if [ -z "$resolved_version" ]; then
          echo "Failed to resolve the latest Node.js {{ node_version }} release from nvm ls-remote." >&2
          exit 1
        fi
        nvm install "$resolved_version"
        nvm alias default "$resolved_version"
        '
      when: node_check.rc != 0

    - name: Verify npm
      ansible.builtin.command: >-
        bash -lc ". {{ nvm_dir }}/nvm.sh && nvm use --silent default >/dev/null && npm -v"
      register: npm_check
      changed_when: false
      failed_when: npm_check.rc != 0

    - name: Check cline CLI installation
      ansible.builtin.command: >-
        bash -lc ". {{ nvm_dir }}/nvm.sh && nvm use --silent default >/dev/null && npm list -g --depth=0 cline"
      register: cline_check
      changed_when: false
      failed_when: false

    - name: Install cline CLI
      ansible.builtin.command: >-
        {{ proxychains_prefix }}bash -lc ". {{ nvm_dir }}/nvm.sh && nvm use --silent default >/dev/null && npm install -g cline@latest"
      when: cline_check.rc != 0

    - name: Ensure nvm lines in shell profiles
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        line: "{{ item.line }}"
        create: true
      loop:
        - { path: "{{ ansible_env.HOME }}/.profile", line: "export NVM_DIR=\"{{ nvm_dir }}\"" }
        - { path: "{{ ansible_env.HOME }}/.profile", line: "[ -s \"{{ nvm_dir }}/nvm.sh\" ] && . \"{{ nvm_dir }}/nvm.sh\"" }
        - { path: "{{ ansible_env.HOME }}/.bashrc", line: "export NVM_DIR=\"{{ nvm_dir }}\"" }
        - { path: "{{ ansible_env.HOME }}/.bashrc", line: "[ -s \"{{ nvm_dir }}/nvm.sh\" ] && . \"{{ nvm_dir }}/nvm.sh\"" }
        - { path: "{{ ansible_env.HOME }}/.bash_profile", line: "export NVM_DIR=\"{{ nvm_dir }}\"" }
        - { path: "{{ ansible_env.HOME }}/.bash_profile", line: "[ -s \"{{ nvm_dir }}/nvm.sh\" ] && . \"{{ nvm_dir }}/nvm.sh\"" }

    - name: Remove nvm installer
      ansible.builtin.file:
        path: /tmp/nvm-install.sh
        state: absent
      when: not nvm_stat.stat.exists
