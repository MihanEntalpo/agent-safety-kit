---
- name: Install codex-glibc (prebuilt)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tasks:
    - name: Register Multipass VM
      ansible.builtin.add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_name }}"
        ansible_connection: theko2fi.multipass.multipass
        ansible_python_interpreter: /usr/bin/python3

- name: Install codex-glibc prebuilt binary
  hosts: "{{ vm_name }}"
  gather_facts: true
  vars:
    codex_binary_name: codex-glibc-prebuilt
    codex_system_path: /usr/local/bin/codex-glibc-prebuilt
    codex_user_path: "{{ ansible_env.HOME }}/.local/bin/codex-glibc-prebuilt"
    codex_prebuilt_url: "{{ hostvars['localhost'].codex_glibc_prebuilt_meta.download_url }}"
  tasks:
    - name: Configure proxychains
      ansible.builtin.include_tasks: "{{ playbook_dir }}/proxychains.yml"

    - name: Install codex-glibc-prebuilt dependencies
      ansible.builtin.apt:
        update_cache: true
        name:
          - bubblewrap
          - curl
          - gzip
      become: true

    - name: Determine codex-glibc prebuilt architecture
      ansible.builtin.set_fact:
        codex_prebuilt_arch: >-
          {{ "arm64" if ansible_architecture in ["aarch64", "arm64"] else "amd64" }}

    - name: Resolve codex-glibc prebuilt release metadata for VM architecture
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - -m
          - agsekit_cli.prebuilt
          - resolve-codex-glibc-prebuilt
          - --arch
          - "{{ codex_prebuilt_arch }}"
      delegate_to: localhost
      connection: local
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: codex_glibc_prebuilt_release
      changed_when: false

    - name: Cache codex-glibc prebuilt release metadata
      ansible.builtin.set_fact:
        codex_glibc_prebuilt_meta: "{{ codex_glibc_prebuilt_release.stdout | from_json }}"

    - name: Set codex-glibc prebuilt download URL
      ansible.builtin.set_fact:
        codex_prebuilt_url: "{{ codex_glibc_prebuilt_meta.download_url }}"

    - name: Check for codex-glibc-prebuilt binary (system)
      ansible.builtin.stat:
        path: "{{ codex_system_path }}"
      register: codex_system_stat

    - name: Check for codex-glibc-prebuilt binary (user)
      ansible.builtin.stat:
        path: "{{ codex_user_path }}"
      register: codex_user_stat

    - name: Check sudo availability
      ansible.builtin.command: sudo -n true
      register: sudo_check
      changed_when: false
      failed_when: false

    - name: Fail when system codex-glibc-prebuilt exists but sudo is unavailable
      ansible.builtin.fail:
        msg: >-
          codex-glibc-prebuilt already exists at {{ codex_system_path }}, but sudo is unavailable,
          so codex-glibc-prebuilt cannot update the installed prebuilt binary.
      when: codex_system_stat.stat.exists and sudo_check.rc != 0

    - name: Determine codex-glibc-prebuilt install target
      ansible.builtin.set_fact:
        codex_install_mode: >-
          {%- if codex_system_stat.stat.exists -%}system
          {%- elif codex_user_stat.stat.exists -%}user
          {%- elif sudo_check.rc == 0 -%}system
          {%- else -%}user
          {%- endif -%}
        codex_install_path: >-
          {{ codex_system_path if codex_system_stat.stat.exists or (not codex_user_stat.stat.exists and sudo_check.rc == 0) else codex_user_path }}

    - name: Download codex-glibc prebuilt archive
      ansible.builtin.command: >-
        {{ proxychains_prefix }}curl -fsSL "{{ codex_prebuilt_url }}" -o /tmp/codex-glibc-prebuilt.gz
      changed_when: true

    - name: Install codex-glibc-prebuilt system-wide
      ansible.builtin.shell: |
        set -euo pipefail
        gzip -dc /tmp/codex-glibc-prebuilt.gz > /tmp/codex-glibc-prebuilt
        sudo install -m 0755 /tmp/codex-glibc-prebuilt "{{ codex_system_path }}"
        rm -f /tmp/codex-glibc-prebuilt /tmp/codex-glibc-prebuilt.gz
      when: codex_install_mode == "system"
      args:
        executable: /bin/bash

    - name: Ensure user bin directory exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/bin"
        state: directory
        mode: "0755"
      when: codex_install_mode == "user"

    - name: Install codex-glibc-prebuilt to user bin
      ansible.builtin.shell: |
        set -euo pipefail
        gzip -dc /tmp/codex-glibc-prebuilt.gz > /tmp/codex-glibc-prebuilt
        install -m 0755 /tmp/codex-glibc-prebuilt "{{ codex_user_path }}"
        rm -f /tmp/codex-glibc-prebuilt /tmp/codex-glibc-prebuilt.gz
      when: codex_install_mode == "user"
      args:
        executable: /bin/bash

    - name: Ensure user bin in PATH
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.profile"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true
      when: codex_install_mode == "user"

    - name: Verify codex-glibc-prebuilt binary exists
      ansible.builtin.stat:
        path: "{{ codex_install_path }}"
      register: installed_codex_stat

    - name: Verify codex-glibc-prebuilt binary works
      ansible.builtin.command: "{{ codex_install_path }} --version"
      register: codex_version_check
      changed_when: false
