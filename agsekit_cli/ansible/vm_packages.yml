---
- name: Prepare VM inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Register Multipass VM
      ansible.builtin.add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_name }}"
        ansible_connection: theko2fi.multipass.multipass
        ansible_python_interpreter: /usr/bin/python3

- name: Install base packages in VM
  hosts: "{{ vm_name }}"
  become: true
  tasks:
    - name: Ensure apt cache is up to date
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - git
          - gzip
          - privoxy
          - proxychains4
          - ripgrep
          - zip
          - zstd
          - zsh
          - 7zip
          - mc
        state: present

    - name: Install agsekit proxychains common script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../agent_scripts/proxychains_common.sh"
        dest: /usr/bin/proxychains_common.sh
        owner: root
        group: root
        mode: "0644"

    - name: Install agsekit proxychains runner script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../run_with_proxychains.sh"
        dest: /usr/bin/agsekit-run_with_proxychains.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install agsekit HTTP proxy runner script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../run_with_http_proxy.sh"
        dest: /usr/bin/agsekit-run_with_http_proxy.sh
        owner: root
        group: root
        mode: "0755"
